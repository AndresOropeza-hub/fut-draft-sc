<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fut Draft Manager Pro - SC</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
      :root {
        --gold: #e2b43a;
        --dark: #111;
        --card-bg: #1a1a1a;
        --success: #2ecc71;
        --text-shadow: 1px 1px 0px #000, -1px -1px 0px #000, 1px -1px 0px #000,
          -1px 1px 0px #000;
      }
      body {
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--dark);
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        margin: 0;
      }
      .container {
        max-width: 1000px;
        width: 100%;
        background: #222;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 15px 50px rgba(0, 0, 0, 0.9);
        border: 1px solid #333;
      }

      /* Estrellas */
      .star-input,
      .star-display {
        text-shadow: var(--text-shadow);
      }
      .star-input {
        color: #444;
        font-size: 22px;
        cursor: pointer;
        transition: transform 0.1s;
        display: inline-block;
        padding: 0 2px;
      }
      .star-input.active,
      .star-display.active {
        color: var(--gold);
      }
      .star-display {
        color: #444;
        font-size: 12px;
      }

      /* Pool de jugadores */
      .pool-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 12px;
        margin-top: 20px;
      }
      .player-item {
        background: #2a2a2a;
        padding: 15px;
        border-radius: 12px;
        cursor: pointer;
        position: relative;
        border: 2px solid transparent;
        transition: 0.2s;
      }
      .player-item.selected {
        border-color: var(--gold);
        background: rgba(226, 180, 58, 0.15);
      }
      .player-item.is-gk-card {
        border-left: 6px solid var(--success) !important;
      }

      /* Cartas de selección (FIFA Style) */
      .choices-container {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 20px;
        min-height: 250px;
        flex-wrap: wrap;
      }
      .choices-container.compact {
        min-height: auto;
        margin-bottom: 10px;
      }
      .fifa-card {
        width: 170px;
        height: 240px;
        background: linear-gradient(135deg, #fbf2c4, #e2b43a, #b08d23);
        color: #111;
        border-radius: 8px;
        padding: 15px;
        text-align: center;
        cursor: pointer;
        clip-path: polygon(
          10% 0%,
          90% 0%,
          100% 10%,
          100% 85%,
          50% 100%,
          0% 85%,
          0% 10%
        );
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: 0.3s;
      }
      .fifa-card.gk {
        background: linear-gradient(135deg, #a8ff78, #78ffd6, #2ecc71);
      }

      /* Personalización de Colores */
      .color-zone-container {
        background: #252525;
        padding: 20px;
        border-radius: 15px;
        margin-bottom: 20px;
        border: 1px solid #333;
        text-align: center;
        width: 100%;
        box-sizing: border-box;
      }
      .color-picker-row {
        display: flex;
        gap: 20px;
        justify-content: center;
        margin-top: 15px;
      }

      .color-btn {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        cursor: pointer;
        transition: 0.3s;
        border: 3px solid rgba(255, 255, 255, 0.1);
      }
      .color-btn:hover {
        transform: scale(1.15);
      }

      .btn-negro {
        background: #000;
        box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.1);
        border-color: #444 !important;
      }
      .btn-blanco {
        background: #fff;
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
      }
      .btn-vinotinto {
        background: #800020;
        box-shadow: 0 0 20px rgba(128, 0, 32, 1);
      }
      .btn-amarillo {
        background: #ffd700;
        box-shadow: 0 0 20px rgba(255, 215, 0, 1);
      }

      /* Auras para el Resumen Final */
      .aura-negro {
        border: 2px solid #333 !important;
        box-shadow: inset 0 0 20px rgba(0, 0, 0, 1),
          0 0 10px rgba(255, 255, 255, 0.05) !important;
      }
      .aura-blanco {
        border: 3px solid #fff !important;
        box-shadow: 0 0 35px rgba(255, 255, 255, 0.7) !important;
      }
      .aura-vinotinto {
        border: 3px solid #800020 !important;
        box-shadow: 0 0 35px rgba(128, 0, 32, 1) !important;
      }
      .aura-amarillo {
        border: 3px solid #ffd700 !important;
        box-shadow: 0 0 35px rgba(255, 215, 0, 1) !important;
      }

      /* Resumen Final */
      #downloadArea {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
        padding: 20px;
        background: #000;
        border-radius: 15px;
      }
      .team-box {
        background: var(--card-bg);
        border: 2px solid #333;
        border-radius: 15px;
        padding: 18px;
        transition: 0.5s ease;
      }
      .player-row-final {
        padding: 8px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      /* Stats */
      .stats-summary-box {
        margin-top: 15px;
        background: rgba(0, 0, 0, 0.6);
        padding: 12px;
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .ovr-main {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        border-bottom: 1px solid rgba(255, 215, 0, 0.2);
        padding-bottom: 8px;
      }
      .ovr-value {
        font-size: 2rem;
        font-weight: 900;
        color: var(--gold);
      }

      .btn-start {
        background: var(--gold);
        color: black;
        border: none;
        padding: 14px;
        border-radius: 10px;
        font-weight: 900;
        cursor: pointer;
        width: 100%;
        text-transform: uppercase;
      }
      .btn-start:disabled {
        background: #333;
        color: #666;
        cursor: not-allowed;
      }
      .hidden {
        display: none;
      }

      #phase-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.95);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        opacity: 0;
        visibility: hidden;
        transition: 0.5s;
      }
      #phase-overlay.show {
        opacity: 1;
        visibility: visible;
      }
    </style>
  </head>
  <body>
    <div id="phase-overlay">
      <div style="text-align: center">
        <p id="overlay-sub" style="color: white; letter-spacing: 5px">
          SIGUIENTE FASE
        </p>
        <h2
          id="overlay-title"
          style="
            font-size: 3.5rem;
            color: var(--gold);
            margin: 0;
            text-transform: uppercase;
          "
        ></h2>
      </div>
    </div>

    <div class="container">
      <div id="setup-view">
        <h1
          style="
            color: var(--gold);
            text-align: center;
            letter-spacing: 4px;
            font-weight: 900;
          "
        >
          FUT DRAFT MANAGER 5V5
        </h1>
        <div
          style="
            background: #252525;
            padding: 20px;
            border-radius: 15px;
            border: 1px dashed var(--gold);
          "
        >
          <div
            style="
              display: flex;
              flex-wrap: wrap;
              gap: 15px;
              justify-content: center;
              align-items: center;
            "
          >
            <input
              type="text"
              id="playerName"
              placeholder="Nombre del Jugador"
              style="
                background: #111;
                border: 1px solid #444;
                color: white;
                padding: 12px;
                border-radius: 8px;
                width: 220px;
              "
            />
            <div>ATK: <span id="atk-stars-input"></span></div>
            <div>DEF: <span id="def-stars-input"></span></div>
            <label><input type="checkbox" id="isGK" /> PORTERO 🧤</label>
            <button
              class="btn-start"
              style="
                width: auto;
                background: var(--success);
                color: white;
                padding: 12px 30px;
              "
              onclick="savePlayer()"
            >
              GUARDAR
            </button>
          </div>
        </div>

        <div style="margin-top: 30px">
          <h3>Lista de Espera (<span id="count">0</span>/15)</h3>
          <div class="pool-grid" id="poolDisplay"></div>
        </div>
        <button
          class="btn-start"
          id="startBtn"
          onclick="iniciarDraft()"
          disabled
          style="margin-top: 40px; font-size: 1.2rem; height: 60px"
        >
          INICIAR DRAFT
        </button>
      </div>

      <div id="draft-view" class="hidden">
        <div
          id="phaseText"
          style="
            background: var(--gold);
            color: black;
            padding: 15px;
            text-align: center;
            font-weight: 900;
            border-radius: 10px;
            margin-bottom: 20px;
          "
        ></div>

        <div id="colorSelectionZone" class="hidden">
          <div class="color-zone-container">
            <h4
              style="
                margin: 0;
                color: var(--gold);
                text-transform: uppercase;
                letter-spacing: 1px;
              "
            >
              ELIGE EL UNIFORME:
              <span id="activeTeamName" style="color: white"></span>
            </h4>
            <div class="color-picker-row" id="mainColorPicker"></div>
          </div>
        </div>

        <div class="choices-container" id="selectionGrid"></div>

        <div id="downloadArea">
          <div id="team-0" class="team-box">
            <h3>EQUIPO 1</h3>
            <div class="team-list"></div>
            <div id="stats-0"></div>
          </div>
          <div id="team-1" class="team-box">
            <h3>EQUIPO 2</h3>
            <div class="team-list"></div>
            <div id="stats-1"></div>
          </div>
          <div id="team-2" class="team-box">
            <h3>EQUIPO 3</h3>
            <div class="team-list"></div>
            <div id="stats-2"></div>
          </div>
        </div>
        <button
          id="downloadBtn"
          class="btn-start hidden"
          onclick="descargarImagen()"
          style="margin-top: 20px; background: var(--success); color: white"
        >
          📥 DESCARGAR RESUMEN FINAL
        </button>
      </div>
    </div>

    <script>
      const BIN_ID = "69c30915c3097a1dd557f5af";
      const API_KEY =
        "$2a$10$C36l5.HCzzvlyZ1HEUMfXu8tAhh9Mmn7h7pk/4QAnlmNUnG//UWke";
      const URL_NUBE = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

      let pool = [],
        selectedPlayers = [],
        teams = [[], [], []],
        teamColors = [null, null, null];
      let turn = 0,
        colorTurn = 0,
        currentPhase = "GK",
        atkInput = 3,
        defInput = 3;

      async function cargarDesdeNube() {
        try {
          const res = await fetch(URL_NUBE + "/latest", {
            headers: { "X-Master-Key": API_KEY },
          });
          const data = await res.json();
          pool = data.record.jugadores || [];
          renderPool();
        } catch (e) {
          console.error("Error al cargar", e);
        }
      }

      async function guardarEnNube() {
        try {
          await fetch(URL_NUBE, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
              "X-Master-Key": API_KEY,
            },
            body: JSON.stringify({ jugadores: pool }),
          });
        } catch (e) {
          console.error("Error al sincronizar", e);
        }
      }

      function getStarHTML(rating, size = "12px") {
        let h = "";
        for (let i = 1; i <= 5; i++)
          h += `<span class="star-display ${
            i <= rating ? "active" : ""
          }" style="font-size:${size}">★</span>`;
        return h;
      }

      function initStars() {
        const render = (id, val, type) => {
          let h = "";
          for (let i = 1; i <= 5; i++)
            h += `<span class="star-input ${
              i <= val ? "active" : ""
            }" onclick="setRating('${type}', ${i})">★</span>`;
          document.getElementById(id).innerHTML = h;
        };
        render("atk-stars-input", atkInput, "atk");
        render("def-stars-input", defInput, "def");
      }

      function setRating(t, v) {
        t === "atk" ? (atkInput = v) : (defInput = v);
        initStars();
      }

      function savePlayer() {
        const name = document.getElementById("playerName").value.trim();
        if (!name) return;
        pool.push({
          name,
          atk: atkInput,
          def: defInput,
          isGK: document.getElementById("isGK").checked,
        });
        document.getElementById("playerName").value = "";
        renderPool();
        guardarEnNube();
      }

      function renderPool() {
        const c = document.getElementById("poolDisplay");
        c.innerHTML = "";
        pool.forEach((p, i) => {
          const sel = selectedPlayers.some((sp) => sp.name === p.name);
          c.innerHTML += `
            <div class="player-item ${sel ? "selected" : ""} ${
            p.isGK ? "is-gk-card" : ""
          }" onclick="togglePlayer(${i})">
              <span style="position:absolute; top:5px; right:8px; color:red; cursor:pointer;" onclick="event.stopPropagation(); pool.splice(${i},1); renderPool(); guardarEnNube();">✖</span>
              <strong>${p.name} ${p.isGK ? "🧤" : ""}</strong>
              <div style="font-size:9px; margin-top:5px; opacity:0.6;">ATK ${getStarHTML(
                p.atk
              )} DEF ${getStarHTML(p.def)}</div>
            </div>`;
        });
        document.getElementById("count").innerText = selectedPlayers.length;
        document.getElementById("startBtn").disabled =
          selectedPlayers.length !== 15;
      }

      function togglePlayer(i) {
        const p = pool[i];
        const idx = selectedPlayers.findIndex((sp) => sp.name === p.name);
        idx > -1
          ? selectedPlayers.splice(idx, 1)
          : selectedPlayers.length < 15 && selectedPlayers.push(p);
        renderPool();
      }

      function showPopup(title, sub, cb) {
        const o = document.getElementById("phase-overlay");
        document.getElementById("overlay-title").innerText = title;
        document.getElementById("overlay-sub").innerText = sub;
        o.classList.add("show");
        setTimeout(() => {
          o.classList.remove("show");
          if (cb) cb();
        }, 1800);
      }

      function iniciarDraft() {
        showPopup("SELECCIÓN DE PORTEROS", "FASE 1", () => {
          document.getElementById("setup-view").classList.add("hidden");
          document.getElementById("draft-view").classList.remove("hidden");
          actualizarDraftUI();
        });
      }

      function actualizarDraftUI() {
        const grid = document.getElementById("selectionGrid");
        grid.innerHTML = "";
        let candidates = [];
        if (currentPhase === "GK") {
          candidates = selectedPlayers.filter((p) => p.isGK);
          document.getElementById("phaseText").innerText = `TURNO EQUIPO ${
            turn + 1
          }: ELIGE PORTERO`;
        } else if (currentPhase === "CAPTAIN") {
          candidates = selectedPlayers
            .filter((p) => !p.isGK)
            .sort((a, b) => b.atk + b.def - (a.atk + a.def))
            .slice(0, 3);
          document.getElementById("phaseText").innerText = `TURNO EQUIPO ${
            turn + 1
          }: ELIGE CAPITÁN`;
        } else {
          candidates = selectedPlayers
            .sort(() => 0.5 - Math.random())
            .slice(0, 3);
          document.getElementById("phaseText").innerText = `TURNO EQUIPO ${
            turn + 1
          }: ELIGE JUGADOR`;
        }

        candidates.forEach((p) => {
          grid.innerHTML += `
            <div class="fifa-card ${p.isGK ? "gk" : ""}" onclick="pickPlayer('${
            p.name
          }')">
              <div style="font-size:2rem;">${p.isGK ? "🧤" : "👕"}</div>
              <div style="font-weight:900; text-transform:uppercase;">${
                p.name
              }</div>
              <div style="background:rgba(0,0,0,0.1); padding:5px; border-radius:5px; width:80%; margin-top:10px; font-size:10px;">
                ATK ${getStarHTML(p.atk)}<br>DEF ${getStarHTML(p.def)}
              </div>
            </div>`;
        });
      }

      function pickPlayer(name) {
        const p = selectedPlayers.find((x) => x.name === name);
        teams[turn].push(p);
        selectedPlayers = selectedPlayers.filter((x) => x.name !== name);
        actualizarEquiposUI();
        if (currentPhase === "GK" && teams.every((t) => t.length === 1)) {
          currentPhase = "CAPTAIN";
          turn = 0;
          showPopup("SELECCIÓN DE CAPITANES", "FASE 2", actualizarDraftUI);
        } else if (
          currentPhase === "CAPTAIN" &&
          teams.every((t) => t.length === 2)
        ) {
          currentPhase = "FIELD";
          turn = 0;
          showPopup("DRAFT LIBRE", "FASE FINAL", actualizarDraftUI);
        } else if (selectedPlayers.length === 0) {
          showPopup(
            "PERSONALIZA TUS EQUIPOS",
            "ÚLTIMO PASO",
            iniciarFaseColores
          );
        } else {
          turn = (turn + 1) % 3;
          actualizarDraftUI();
        }
      }

      function actualizarEquiposUI() {
        teams.forEach((t, i) => {
          const box = document.getElementById(`team-${i}`);
          box.classList.remove(
            "aura-negro",
            "aura-blanco",
            "aura-vinotinto",
            "aura-amarillo"
          );

          if (teamColors[i]) {
            if (teamColors[i] === "#000") box.classList.add("aura-negro");
            else if (teamColors[i] === "#fff") box.classList.add("aura-blanco");
            else if (teamColors[i] === "#800020")
              box.classList.add("aura-vinotinto");
            else if (teamColors[i] === "#ffd700")
              box.classList.add("aura-amarillo");
          }

          box.querySelector(".team-list").innerHTML = t
            .map(
              (p) => `
            <div class="player-row-final">
              <span>${p.isGK ? "🧤" : "👕"} <strong>${p.name}</strong></span>
              <div class="mini-stars">
                <div style="font-size:8px;">${getStarHTML(p.atk)}</div>
                <div style="font-size:8px;">${getStarHTML(p.def)}</div>
              </div>
            </div>`
            )
            .join("");

          if (t.length > 0) {
            const avgAtk = t.reduce((s, p) => s + p.atk, 0) / t.length;
            const avgDef = t.reduce((s, p) => s + p.def, 0) / t.length;
            const overall = ((avgAtk + avgDef) / 2).toFixed(1);
            document.getElementById(
              `stats-${i}`
            ).innerHTML = `<div class="stats-summary-box"><div class="ovr-main"><div class="ovr-value">${overall}</div><div style="text-align:left"><div style="font-size:10px; font-weight:bold;">OVR</div><div>${getStarHTML(
              Math.round(overall),
              "14px"
            )}</div></div></div><div style="display:flex; justify-content:space-around; font-size:12px;"><div>ATK: ${avgAtk.toFixed(
              1
            )}</div><div>DEF: ${avgDef.toFixed(1)}</div></div></div>`;
          }
        });
      }

      function iniciarFaseColores() {
        document.getElementById("selectionGrid").classList.add("compact");
        document.getElementById("selectionGrid").innerHTML = "";
        document.getElementById("phaseText").innerText =
          "PERSONALIZACIÓN DE EQUIPOS";
        document
          .getElementById("colorSelectionZone")
          .classList.remove("hidden");
        renderMainColorPicker();
      }

      function renderMainColorPicker() {
        const container = document.getElementById("mainColorPicker");
        document.getElementById("activeTeamName").innerText = `EQUIPO ${
          colorTurn + 1
        }`;
        const colors = [
          { id: "negro", hex: "#000", c: "btn-negro" },
          { id: "blanco", hex: "#fff", c: "btn-blanco" },
          { id: "vinotinto", hex: "#800020", c: "btn-vinotinto" },
          { id: "amarillo", hex: "#ffd700", c: "btn-amarillo" },
        ];
        container.innerHTML = colors
          .filter((c) => !teamColors.includes(c.hex))
          .map(
            (c) =>
              `<div class="color-btn ${c.c}" onclick="selectFinalColor('${c.hex}')"></div>`
          )
          .join("");
      }

      function selectFinalColor(hex) {
        teamColors[colorTurn] = hex;
        actualizarEquiposUI();
        if (colorTurn < 2) {
          colorTurn++;
          renderMainColorPicker();
        } else {
          document.getElementById("colorSelectionZone").classList.add("hidden");
          document.getElementById("downloadBtn").classList.remove("hidden");
          document.getElementById("phaseText").innerText = "DRAFT COMPLETADO";
          document.getElementById("selectionGrid").classList.add("hidden");
        }
      }

      function descargarImagen() {
        const area = document.getElementById("downloadArea");
        const individuales = area.querySelectorAll(".mini-stars");

        // 1. Ocultamos las estrellas individuales antes de la captura
        individuales.forEach((el) => (el.style.display = "none"));

        html2canvas(area, { backgroundColor: "#000", scale: 3 }).then(
          (canvas) => {
            const link = document.createElement("a");
            link.download = `Draft_Final_${new Date().getHours()}h.png`;
            link.href = canvas.toDataURL();
            link.click();

            // 2. Las volvemos a mostrar para que no desaparezcan de la web
            individuales.forEach((el) => (el.style.display = "block"));
          }
        );
      }

      initStars();
      cargarDesdeNube();
    </script>
  </body>
</html>
