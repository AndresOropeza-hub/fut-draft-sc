<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fut Draft Manager Pro - SC</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --gold: #e2b43a; --dark: #111; --card-bg: #1a1a1a; --success: #2ecc71; }
        body { font-family: "Segoe UI", sans-serif; background-color: var(--dark); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { max-width: 1000px; width: 100%; background: #222; padding: 30px; border-radius: 20px; box-shadow: 0 15px 50px rgba(0, 0, 0, 0.9); border: 1px solid #333; }
        .star-input { color: #555; font-size: 22px; cursor: pointer; transition: transform 0.1s, color 0.2s; display: inline-block; padding: 0 2px; }
        .star-input:hover { transform: scale(1.3); color: var(--gold); }
        .star-input.active, .star-display.active { color: var(--gold); }
        .star-display { color: #555; cursor: default; font-size: 12px; }
        .player-item.is-gk-card { border-left: 6px solid var(--success) !important; background: rgba(46, 204, 113, 0.08) !important; }
        .player-item.is-gk-card strong { color: var(--success); }
        .admin-panel { background: #252525; padding: 20px; border-radius: 15px; border: 1px dashed var(--gold); margin-bottom: 30px; }
        .input-group { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; align-items: center; }
        input[type="text"] { background: #111; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; width: 200px; }
        .pool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-top: 20px; }
        .player-item { background: #333; padding: 15px; border-radius: 10px; cursor: pointer; position: relative; border: 2px solid transparent; transition: 0.2s; }
        .player-item.selected { border-color: var(--gold); background: rgba(226, 180, 58, 0.1); }
        .delete-btn { position: absolute; top: 5px; right: 8px; color: #e74c3c; cursor: pointer; font-size: 14px; }
        .choices-container { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; min-height: 250px; flex-wrap: wrap; }
        .fifa-card { width: 160px; height: 230px; background: linear-gradient(135deg, #fbf2c4, #e2b43a, #b08d23); color: #111; border-radius: 8px; padding: 10px; text-align: center; cursor: pointer; clip-path: polygon(10% 0%, 90% 0%, 100% 10%, 100% 85%, 50% 100%, 0% 85%, 0% 10%); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .fifa-card:hover { transform: translateY(-10px); filter: brightness(1.1); }
        .fifa-card.gk { background: linear-gradient(135deg, #a8ff78, #78ffd6); }
        #downloadArea { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; padding: 15px; border-radius: 15px; }
        .team-box { background: var(--card-bg); border: 2px solid #333; border-radius: 15px; padding: 18px; transition: 0.4s ease; }
        .team-box h3 { margin-top: 0; color: var(--gold); }
        .avg-stars { margin-top: 15px; padding-top: 10px; border-top: 1px solid #333; font-size: 13px; }
        .color-picker-row { display: flex; gap: 15px; justify-content: center; margin: 20px 0; background: #222; padding: 20px; border-radius: 12px; }
        .color-btn { width: 40px; height: 40px; border-radius: 50%; border: 3px solid #444; cursor: pointer; transition: 0.2s; }
        .bg-negro { background: #000; } .bg-blanco { background: #fff; } .bg-vinotinto { background: #800020; } .bg-amarillo { background: #ffd700; }
        .btn-start { background: var(--gold); color: black; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-download { background: var(--success); color: white; width: auto; padding: 12px 30px; margin: 20px auto; display: block; font-weight: bold; border-radius: 30px; border: none; cursor: pointer; }
        .hidden { display: none; }
        #phase-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; visibility: hidden; transition: 0.5s; }
        #phase-overlay.show { opacity: 1; visibility: visible; }
    </style>
</head>
<body>

    <div id="phase-overlay">
        <div style="text-align: center;">
            <p id="overlay-sub" style="color: white; letter-spacing: 2px;">SIGUIENTE FASE</p>
            <h2 id="overlay-title" style="font-size: 3.5rem; color: var(--gold); margin: 0;"></h2>
        </div>
    </div>

    <div class="container">
        <div id="setup-view">
            <h1 style="color:var(--gold); text-align:center; letter-spacing: 2px;">FUT DRAFT MANAGER 5V5</h1>
            <div class="admin-panel">
                <div class="input-group">
                    <input type="text" id="playerName" placeholder="Nombre Jugador">
                    <div style="font-size: 14px;">ATK: <span id="atk-stars-input"></span></div>
                    <div style="font-size: 14px;">DEF: <span id="def-stars-input"></span></div>
                    <label style="cursor: pointer;"><input type="checkbox" id="isGK"> PORTERO 🧤</label>
                    <button class="btn-start" style="width:auto; background:var(--success); color:white; padding: 10px 25px;" onclick="savePlayer()">GUARDAR</button>
                </div>
            </div>
            <div class="admin-panel">
                <h3 style="margin-top:0;">Lista de Espera (<span id="count">0</span>/15)</h3>
                <div class="pool-grid" id="poolDisplay">Cargando...</div>
            </div>
            <button class="btn-start" id="startBtn" onclick="iniciarDraft()" disabled>INICIAR DRAFT POR TURNOS</button>
        </div>

        <div id="draft-view" class="hidden">
            <div id="phaseText" style="background:var(--gold); color:black; padding:12px; text-align:center; font-weight:900; border-radius:8px; margin-bottom:25px;">FASE 1: ELIGE PORTERO</div>
            <div id="colorSelectionZone" class="hidden">
                <h3 style="text-align:center; color:var(--gold);">ASIGNA EL COLOR: <span id="activeTeamName"></span></h3>
                <div class="color-picker-row" id="mainColorPicker"></div>
            </div>
            <div class="choices-container" id="selectionGrid"></div>
            <button id="downloadBtn" class="btn-download hidden" onclick="descargarImagen()">📥 DESCARGAR RESUMEN</button>
            <div id="downloadArea">
                <div id="team-0" class="team-box"><h3>EQUIPO 1</h3><div class="team-list"></div><div id="stats-0" class="avg-stars"></div></div>
                <div id="team-1" class="team-box"><h3>EQUIPO 2</h3><div class="team-list"></div><div id="stats-1" class="avg-stars"></div></div>
                <div id="team-2" class="team-box"><h3>EQUIPO 3</h3><div class="team-list"></div><div id="stats-2" class="avg-stars"></div></div>
            </div>
        </div>
    </div>

    <script>
        const BIN_ID = "69c30915c3097a1dd557f5af";
        const API_KEY = "$2a$10$C36l5.HCzzvlyZ1HEUMfXu8tAhh9Mmn7h7pk/4QAnlmNUnG//UWke";
        const URL_NUBE = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        let pool = [];
        let selectedPlayers = [];
        let teams = [[], [], []];
        let teamColors = [null, null, null];
        let turn = 0, colorTurn = 0, currentPhase = "GK";
        let atkInput = 3, defInput = 3;

        async function cargarDesdeNube() {
            try {
                const res = await fetch(URL_NUBE + "/latest", { headers: { "X-Master-Key": API_KEY } });
                const data = await res.json();
                pool = data.record.jugadores || [];
                renderPool();
            } catch (e) { console.error("Error al cargar", e); }
        }

        async function guardarEnNube() {
            try {
                await fetch(URL_NUBE, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                    body: JSON.stringify({ jugadores: pool })
                });
            } catch (e) { console.error("Error al sincronizar", e); }
        }

        function getStarHTML(rating) {
            let h = "";
            for(let i=1; i<=5; i++) h += `<span class="star-display ${i<=rating?'active':''}">★</span>`;
            return h;
        }

        function initStars() {
            const render = (id, val, type) => {
                let h = "";
                for(let i=1; i<=5; i++) h += `<span class="star-input ${i<=val?'active':''}" onclick="setRating('${type}', ${i})">★</span>`;
                document.getElementById(id).innerHTML = h;
            };
            render("atk-stars-input", atkInput, 'atk');
            render("def-stars-input", defInput, 'def');
        }

        function setRating(t, v) { if(t==='atk') atkInput=v; else defInput=v; initStars(); }

        async function savePlayer() {
            const name = document.getElementById("playerName").value.trim();
            if(!name) return;
            pool.push({ name, atk: atkInput, def: defInput, isGK: document.getElementById("isGK").checked });
            document.getElementById("playerName").value = "";
            renderPool();
            await guardarEnNube();
        }

        function renderPool() {
            const c = document.getElementById("poolDisplay");
            c.innerHTML = "";
            pool.forEach((p, i) => {
                const sel = selectedPlayers.some(sp => sp.name === p.name);
                const gkClass = p.isGK ? 'is-gk-card' : '';
                c.innerHTML += `
                    <div class="player-item ${sel?'selected':''} ${gkClass}" onclick="togglePlayer(${i})">
                        <span class="delete-btn" onclick="event.stopPropagation(); pool.splice(${i},1); renderPool(); guardarEnNube();">✖</span>
                        <strong>${p.name} ${p.isGK?'🧤':''}</strong><br>
                        <div style="font-size:10px; margin-top:5px; opacity: 0.8;">ATK: ${getStarHTML(p.atk)} | DEF: ${getStarHTML(p.def)}</div>
                    </div>`;
            });
            document.getElementById("count").innerText = selectedPlayers.length;
            document.getElementById("startBtn").disabled = selectedPlayers.length !== 15;
        }

        function togglePlayer(i) {
            const p = pool[i];
            const idx = selectedPlayers.findIndex(sp => sp.name === p.name);
            if(idx > -1) selectedPlayers.splice(idx, 1);
            else if(selectedPlayers.length < 15) selectedPlayers.push(p);
            renderPool();
        }

        function showPopup(title, sub, cb) {
            const o = document.getElementById("phase-overlay");
            document.getElementById("overlay-title").innerText = title;
            document.getElementById("overlay-sub").innerText = sub;
            o.classList.add("show");
            setTimeout(() => { o.classList.remove("show"); if(cb) cb(); }, 1800);
        }

        function iniciarDraft() {
            showPopup("SELECCIÓN DE PORTEROS", "FASE 1", () => {
                document.getElementById("setup-view").classList.add("hidden");
                document.getElementById("draft-view").classList.remove("hidden");
                actualizarDraftUI();
            });
        }

        function actualizarDraftUI() {
            const grid = document.getElementById("selectionGrid");
            grid.innerHTML = "";
            let candidates = [];
            if(currentPhase === "GK") {
                candidates = selectedPlayers.filter(p => p.isGK);
                document.getElementById("phaseText").innerText = `TURNO EQUIPO ${turn+1}: ELIGE PORTERO`;
            } else if(currentPhase === "CAPTAIN") {
                candidates = selectedPlayers.filter(p => !p.isGK).sort((a,b)=>(b.atk+b.def)-(a.atk+a.def)).slice(0,3);
                document.getElementById("phaseText").innerText = `TURNO EQUIPO ${turn+1}: ELIGE CAPITÁN`;
            } else {
                candidates = selectedPlayers.sort(() => 0.5 - Math.random()).slice(0, 3);
                document.getElementById("phaseText").innerText = `TURNO EQUIPO ${turn+1}: ELIGE JUGADOR`;
            }
            candidates.forEach(p => {
                grid.innerHTML += `<div class="fifa-card ${p.isGK?'gk':''}" onclick="pickPlayer('${p.name}')">
                    <div style="font-size: 1.8rem; margin-bottom:5px;">${p.isGK?'🧤':'👕'}</div>
                    <div style="font-weight:900; text-transform: uppercase; font-size:14px;">${p.name}</div>
                    <div style="margin-top:10px;">
                        <div style="font-size:9px; color:#333;">ATK: ${getStarHTML(p.atk)}</div>
                        <div style="font-size:9px; color:#333;">DEF: ${getStarHTML(p.def)}</div>
                    </div>
                </div>`;
            });
        }

        function pickPlayer(name) {
            const p = selectedPlayers.find(x => x.name === name);
            teams[turn].push(p);
            selectedPlayers = selectedPlayers.filter(x => x.name !== name);
            actualizarEquiposUI();
            if(currentPhase === "GK" && teams.every(t => t.length === 1)) {
                currentPhase = "CAPTAIN"; turn = 0;
                showPopup("SELECCIÓN DE CAPITANES", "FASE 2", actualizarDraftUI);
            } else if(currentPhase === "CAPTAIN" && teams.every(t => t.length === 2)) {
                currentPhase = "FIELD"; turn = 0;
                showPopup("DRAFT LIBRE", "FASE FINAL", actualizarDraftUI);
            } else if(selectedPlayers.length === 0) {
                iniciarFaseColores();
            } else {
                turn = (turn + 1) % 3;
                actualizarDraftUI();
            }
        }

        function actualizarEquiposUI() {
            teams.forEach((t, i) => {
                const box = document.getElementById(`team-${i}`);
                if (teamColors[i]) box.style.border = `4px solid ${teamColors[i]}`;
                
                // Mostramos solo Nombre y valores numéricos (opcional), SIN estrellas individuales
                box.querySelector(".team-list").innerHTML = t.map(p => `
                    <div style="padding:10px 0; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-size:15px;">${p.isGK?'🧤':'👕'} <strong>${p.name}</strong></span>
                        <div style="text-align:right; font-size:11px; opacity:0.6;">
                            A:${p.atk} D:${p.def}
                        </div>
                    </div>`).join("");

                // Mantenemos los promedios del equipo con estrellas
                if(t.length > 0) {
                    const avgAtk = (t.reduce((s, p) => s + p.atk, 0) / t.length).toFixed(1);
                    const avgDef = (t.reduce((s, p) => s + p.def, 0) / t.length).toFixed(1);
                    document.getElementById(`stats-${i}`).innerHTML = `
                        <strong>PROM. EQUIPO:</strong><br>
                        ATK: ${getStarHTML(Math.round(avgAtk))} (${avgAtk})<br>
                        DEF: ${getStarHTML(Math.round(avgDef))} (${avgDef})
                    `;
                }
            });
        }

        function iniciarFaseColores() {
            document.getElementById("selectionGrid").innerHTML = "";
            document.getElementById("phaseText").innerText = "PERSONALIZACIÓN FINAL";
            document.getElementById("colorSelectionZone").classList.remove("hidden");
            renderMainColorPicker();
        }

        function renderMainColorPicker() {
            const container = document.getElementById("mainColorPicker");
            document.getElementById("activeTeamName").innerText = `EQUIPO ${colorTurn + 1}`;
            const colors = [{ id: 'negro', hex: '#000' }, { id: 'blanco', hex: '#fff' }, { id: 'vinotinto', hex: '#800020' }, { id: 'amarillo', hex: '#ffd700' }];
            container.innerHTML = colors.map(c => `<div class="color-btn bg-${c.id}" onclick="selectFinalColor('${c.hex}')"></div>`).join("");
        }

        function selectFinalColor(hex) {
            teamColors[colorTurn] = hex;
            actualizarEquiposUI();
            if(colorTurn < 2) { colorTurn++; renderMainColorPicker(); }
            else { 
                document.getElementById("colorSelectionZone").classList.add("hidden");
                document.getElementById("downloadBtn").classList.remove("hidden");
            }
        }

        function descargarImagen() {
            const area = document.getElementById("downloadArea");
            html2canvas(area, { backgroundColor: "#111", scale: 2 }).then(canvas => {
                const link = document.createElement("a");
                link.download = "Draft_Final.png";
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        initStars();
        cargarDesdeNube();
    </script>
</body>
</html>
