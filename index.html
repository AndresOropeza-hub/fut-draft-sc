<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fut Draft Manager Pro - SC</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --gold: #e2b43a; --dark: #111; --card-bg: #1a1a1a; --success: #2ecc71; }
        body { font-family: "Segoe UI", sans-serif; background-color: var(--dark); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { max-width: 1000px; width: 100%; background: #222; padding: 30px; border-radius: 20px; box-shadow: 0 15px 50px rgba(0, 0, 0, 0.9); border: 1px solid #333; }
        .star-input { color: #555; font-size: 22px; cursor: pointer; transition: transform 0.1s, color 0.2s; display: inline-block; padding: 0 2px; }
        .star-input.active, .star-display.active { color: var(--gold); }
        .star-display { color: #555; cursor: default; font-size: 12px; }
        .player-item { background: #333; padding: 15px; border-radius: 10px; cursor: pointer; position: relative; border: 2px solid transparent; transition: 0.2s; }
        .player-item.is-gk-card { border-left: 6px solid var(--success) !important; background: rgba(46, 204, 113, 0.08) !important; }
        .pool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-top: 20px; }
        .fifa-card { width: 160px; height: 230px; background: linear-gradient(135deg, #fbf2c4, #e2b43a, #b08d23); color: #111; border-radius: 8px; padding: 10px; text-align: center; cursor: pointer; clip-path: polygon(10% 0%, 90% 0%, 100% 10%, 100% 85%, 50% 100%, 0% 85%, 0% 10%); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .fifa-card.gk { background: linear-gradient(135deg, #a8ff78, #78ffd6); }
        #downloadArea { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; padding: 15px; border-radius: 15px; }
        .team-box { background: var(--card-bg); border: 2px solid #333; border-radius: 15px; padding: 18px; transition: 0.4s ease; }
        .color-btn { width: 45px; height: 45px; border-radius: 50%; border: 3px solid #444; cursor: pointer; transition: 0.2s; }
        .bg-negro { background: #000; } .bg-blanco { background: #fff; } .bg-vinotinto { background: #800020; } .bg-amarillo { background: #ffd700; }
        .btn-start { background: var(--gold); color: black; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-download { background: var(--success); color: white; width: auto; padding: 12px 30px; margin: 20px auto; display: block; font-weight: bold; border-radius: 30px; border: none; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div id="setup-view">
            <h1 style="color:var(--gold); text-align:center;">FUT DRAFT MANAGER 5V5</h1>
            <div style="background:#252525; padding:20px; border-radius:15px; margin-bottom:20px;">
                <input type="text" id="playerName" placeholder="Nombre Jugador" style="padding:10px; border-radius:5px; border:none; width:200px;">
                <span id="atk-stars-input"></span>
                <span id="def-stars-input"></span>
                <label><input type="checkbox" id="isGK"> PORTERO 🧤</label>
                <button onclick="savePlayer()" style="background:var(--success); color:white; padding:10px 20px; border:none; border-radius:5px; cursor:pointer;">GUARDAR</button>
            </div>
            <div class="pool-grid" id="poolDisplay"></div>
            <button class="btn-start" id="startBtn" onclick="iniciarDraft()" disabled>INICIAR DRAFT POR TURNOS</button>
        </div>

        <div id="draft-view" class="hidden">
            <div id="phaseText" style="background:var(--gold); color:black; padding:12px; text-align:center; font-weight:900; border-radius:8px; margin-bottom:25px;">FASE 1: ELIGE PORTERO</div>
            
            <div id="colorSelectionZone" class="hidden">
                <h3 style="text-align:center; color:var(--gold);">ASIGNA EL COLOR: <span id="activeTeamName"></span></h3>
                <div style="display:flex; gap:15px; justify-content:center; margin:20px 0;" id="mainColorPicker"></div>
            </div>

            <div style="display:flex; justify-content:center; gap:20px; margin-bottom:30px; flex-wrap:wrap;" id="selectionGrid"></div>
            
            <button id="downloadBtn" class="btn-download hidden" onclick="descargarImagen()">📥 DESCARGAR RESUMEN</button>
            
            <div id="downloadArea">
                <div id="team-0" class="team-box"><h3>EQUIPO 1</h3><div class="team-list"></div><div id="stats-0"></div></div>
                <div id="team-1" class="team-box"><h3>EQUIPO 2</h3><div class="team-list"></div><div id="stats-1"></div></div>
                <div id="team-2" class="team-box"><h3>EQUIPO 3</h3><div class="team-list"></div><div id="stats-2"></div></div>
            </div>
        </div>
    </div>

    <script>
        const BIN_ID = "69c30915c3097a1dd557f5af";
        const API_KEY = "$2a$10$C36l5.HCzzvlyZ1HEUMfXu8tAhh9Mmn7h7pk/4QAnlmNUnG//UWke";
        
        let pool = [];
        let selectedPlayers = [];
        let teams = [[], [], []];
        let teamColors = [null, null, null];
        let turn = 0, colorTurn = 0, currentPhase = "GK";
        let atkInput = 3, defInput = 3;

        // Estrellas visuales para Draft y Promedios
        function getStarHTML(rating) {
            let h = "";
            for(let i=1; i<=5; i++) h += `<span class="star-display ${i<=rating?'active':''}">★</span>`;
            return h;
        }

        function savePlayer() {
            const name = document.getElementById("playerName").value.trim();
            if(!name) return;
            pool.push({ name, atk: atkInput, def: defInput, isGK: document.getElementById("isGK").checked });
            document.getElementById("playerName").value = "";
            renderPool();
        }

        function renderPool() {
            const c = document.getElementById("poolDisplay");
            c.innerHTML = pool.map((p, i) => `
                <div class="player-item ${p.isGK?'is-gk-card':''}" onclick="togglePlayer(${i})">
                    <strong>${p.name} ${p.isGK?'🧤':''}</strong><br>
                    ${getStarHTML(p.atk)} | ${getStarHTML(p.def)}
                </div>`).join("");
            document.getElementById("startBtn").disabled = pool.length < 15;
        }

        function iniciarDraft() {
            selectedPlayers = [...pool];
            document.getElementById("setup-view").classList.add("hidden");
            document.getElementById("draft-view").classList.remove("hidden");
            actualizarDraftUI();
        }

        function actualizarDraftUI() {
            const grid = document.getElementById("selectionGrid");
            grid.innerHTML = "";
            let candidates = selectedPlayers.sort(() => 0.5 - Math.random()).slice(0, 3);

            candidates.forEach(p => {
                grid.innerHTML += `
                <div class="fifa-card ${p.isGK?'gk':''}" onclick="pickPlayer('${p.name}')">
                    <div style="font-size: 1.8rem;">${p.isGK?'🧤':'👕'}</div>
                    <div style="font-weight:900; text-transform:uppercase;">${p.name}</div>
                    <div style="margin-top:10px;">
                        ${getStarHTML(p.atk)}<br>${getStarHTML(p.def)}
                    </div>
                </div>`;
            });
        }

        function pickPlayer(name) {
            const p = selectedPlayers.find(x => x.name === name);
            teams[turn].push(p);
            selectedPlayers = selectedPlayers.filter(x => x.name !== name);
            actualizarEquiposUI();
            if(selectedPlayers.length === 0) {
                iniciarFaseColores();
            } else {
                turn = (turn + 1) % 3;
                actualizarDraftUI();
            }
        }

        // Resumen Final: Sin números individuales, solo promedios
        function actualizarEquiposUI() {
            teams.forEach((t, i) => {
                const box = document.getElementById(`team-${i}`);
                if (teamColors[i]) box.style.border = `4px solid ${teamColors[i]}`;
                
                box.querySelector(".team-list").innerHTML = t.map(p => `
                    <div style="padding:10px 0; border-bottom:1px solid #333; font-size:16px;">
                        ${p.isGK?'🧤':'👕'} <strong>${p.name}</strong>
                    </div>`).join("");

                if(t.length > 0) {
                    const avgAtk = (t.reduce((s, p) => s + p.atk, 0) / t.length).toFixed(1);
                    const avgDef = (t.reduce((s, p) => s + p.def, 0) / t.length).toFixed(1);
                    document.getElementById(`stats-${i}`).innerHTML = `
                        <div style="margin-top:15px; border-top:1px solid #444; padding-top:10px;">
                            <strong>PROM. EQUIPO</strong><br>
                            ATK: ${getStarHTML(Math.round(avgAtk))} (${avgAtk})<br>
                            DEF: ${getStarHTML(Math.round(avgDef))} (${avgDef})
                        </div>`;
                }
            });
        }

        function iniciarFaseColores() {
            document.getElementById("selectionGrid").innerHTML = "";
            document.getElementById("colorSelectionZone").classList.remove("hidden");
            renderMainColorPicker();
        }

        // Filtro de colores para evitar duplicados
        function renderMainColorPicker() {
            const container = document.getElementById("mainColorPicker");
            document.getElementById("activeTeamName").innerText = `EQUIPO ${colorTurn + 1}`;
            const colors = [
                { id: 'negro', hex: '#000' }, { id: 'blanco', hex: '#fff' }, 
                { id: 'vinotinto', hex: '#800020' }, { id: 'amarillo', hex: '#ffd700' }
            ];
            const available = colors.filter(c => !teamColors.includes(c.hex));

            container.innerHTML = available.map(c => `
                <div class="color-btn bg-${c.id}" onclick="selectFinalColor('${c.hex}')"></div>`).join("");
        }

        function selectFinalColor(hex) {
            teamColors[colorTurn] = hex;
            actualizarEquiposUI();
            if(colorTurn < 2) { colorTurn++; renderMainColorPicker(); }
            else { 
                document.getElementById("colorSelectionZone").classList.add("hidden");
                document.getElementById("downloadBtn").classList.remove("hidden");
            }
        }

        function descargarImagen() {
            const area = document.getElementById("downloadArea");
            html2canvas(area, { backgroundColor: "#111", scale: 2 }).then(canvas => {
                const link = document.createElement("a");
                link.download = "Draft_Final.png";
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
</body>
</html>
